<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gráficos — Bolão dos "Entendidos"</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="images/simbolo.png">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
</head>
<body>
  <nav id="nav"></nav>

  <div class="page">
    <div class="page-header">
      <h1>📊 Gráficos</h1>
      <button onclick="init()" class="btn btn-secondary btn-sm">Atualizar</button>
    </div>

    <!-- Seletor de visualização e filtros -->
    <div style="display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center">
      <div>
        <label for="chart-type" style="display:block;font-size:0.85rem;color:var(--cinza);margin-bottom:4px">Tipo de Gráfico:</label>
        <select id="chart-type" onchange="renderChart()" class="form-input" style="min-width:200px">
          <option value="posicoes">Evolução de Posições</option>
          <option value="pontos">Evolução de Pontos</option>
          <option value="comparacao">Comparação entre Usuários</option>
        </select>
      </div>
      
      <div id="filter-usuarios-div" style="display:none">
        <label for="filter-usuarios" style="display:block;font-size:0.85rem;color:var(--cinza);margin-bottom:4px">Usuários a Comparar:</label>
        <select id="filter-usuarios" multiple class="form-input" style="min-width:200px;height:40px" onchange="renderChart()">
          <!-- Preenchido dinamicamente -->
        </select>
        <div style="font-size:0.75rem;color:var(--cinza);margin-top:4px">Use Ctrl/Cmd + clique para selecionar múltiplos</div>
      </div>
    </div>

    <!-- Botões de seleção rápida -->
    <div id="legend-controls" style="display:none;gap:8px;margin-bottom:12px;flex-wrap:wrap">
      <button onclick="toggleAllSeries(true)" class="btn btn-secondary btn-sm">Selecionar todos</button>
      <button onclick="toggleAllSeries(false)" class="btn btn-secondary btn-sm">Limpar todos</button>
    </div>

    <!-- Container do gráfico -->
    <div style="background:white;padding:20px;border-radius:10px;box-shadow:var(--shadow);margin-bottom:20px">
      <canvas id="myChart" style="max-height:400px"></canvas>
      <div id="loading-msg" class="loading-msg">Carregando dados...</div>
      <div id="scroll-wrap" style="display:none;margin-top:12px">
        <div style="display:flex;align-items:center;gap:10px;font-size:0.8rem;color:var(--cinza)">
          <span>◀ Mais antigos</span>
          <input type="range" id="chart-scroll" style="flex:1;accent-color:var(--verde)" oninput="onChartScroll()">
          <span>Mais recentes ▶</span>
        </div>
      </div>
    </div>

    <!-- Legenda de eventos (fases) -->
    <div style="background:white;padding:16px;border-radius:10px;box-shadow:var(--shadow);font-size:0.85rem;color:var(--cinza)">
      <strong>Fases:</strong> <span id="fases-legend"></span>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/flags.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>
  <script src="js/graficos.js"></script>
</body>
</html>
